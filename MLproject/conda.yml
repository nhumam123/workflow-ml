name: ml-env

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.12.7
  - pip

  # Scientific stack
  - numpy=2.5.0
  - pandas=2.3.3
  - scipy=1.18.0
  - scikit-learn=1.9.0
  - matplotlib=3.11.0
  - xgboost=3.3.0
  - pyarrow=18.1.0
  - imbalanced-learn=0.14.2

  # Database
  - sqlalchemy=2.0.51
  - alembic=1.18.5

  # Security / Networking
  - cryptography=49.0.0
  - requests=2.34.2
  - urllib3=2.7.0
  - certifi=2026.6.17
  - cffi=2.0.0

  # Web
  - flask=3.1.3
  - werkzeug=3.1.8
  - jinja2=3.1.6
  - click=8.4.2
  - blinker=1.9.0
  - itsdangerous=2.2.0
  - waitress=3.0.2

  # Plotting
  - pillow=12.2.0
  - contourpy=1.3.3
  - cycler=0.12.1
  - fonttools=4.63.0
  - kiwisolver=1.5.0
  - pyparsing=3.3.2

  # Utilities
  - pyyaml=6.0.3
  - psutil=7.2.2
  - protobuf=5.29.6
  - markdown=3.10.2
  - packaging=24.2
  - python-dateutil=2.9.0.post0
  - pytz=2026.2
  - tzdata=2026.2
  - typing_extensions=4.15.0
  - joblib=1.5.3
  - threadpoolctl=3.6.0
  - greenlet=3.5.2
  - mako=1.3.12

  # Git
  - gitpython=3.1.50

  - pip:
      - databricks-sdk==0.119.0
      - docker==7.1.0
      - google-auth==2.55.1
      - graphene==3.4.3
      - graphql-core==3.2.11
      - graphql-relay==3.2.0
      - mlflow==2.19.0
      - mlflow-skinny==2.19.0
      - narwhals==2.22.1
      - opentelemetry-api==1.43.0
      - opentelemetry-sdk==1.43.0
      - opentelemetry-semantic-conventions==0.64b0
      - prometheus-client==0.25.0
      - pyasn1==0.6.3
      - pyasn1-modules==0.4.2
      - sklearn-compat==0.1.6
      - dagshub